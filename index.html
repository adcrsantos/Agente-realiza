<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Realiza Tour — Agente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #0B6B47;
    --verde-mid: #12956A;
    --verde-light: #E4F4EC;
    --verde-glow: rgba(18,149,106,0.12);
    --amarelo: #F5A623;
    --amarelo-light: #FEF6E7;
    --bg: #F2F5F3;
    --branco: #FFFFFF;
    --bolha-user: #0B6B47;
    --bolha-agente: #FFFFFF;
    --texto: #1A2420;
    --texto-suave: #6B8278;
    --borda: #DDE8E3;
    --sombra: 0 2px 12px rgba(11,107,71,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--branco);
    border-bottom: 1px solid var(--borda);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: var(--sombra);
    z-index: 10;
  }

  .avatar {
    width: 40px; height: 40px;
    background: var(--verde);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-info { flex: 1; }

  .header-nome {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--texto);
    line-height: 1.2;
  }

  .header-status {
    font-size: 11px;
    color: var(--verde-mid);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 2px;
  }

  .dot-online {
    width: 6px; height: 6px;
    background: var(--verde-mid);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── CHAT ── */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--borda); border-radius: 4px; }

  /* ── MENSAGENS ── */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(6px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
  }

  .msg-row.user .msg-bubble {
    background: var(--bolha-user);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-row.agente .msg-bubble {
    background: var(--bolha-agente);
    color: var(--texto);
    border-bottom-left-radius: 4px;
    box-shadow: var(--sombra);
  }

  .msg-hora {
    font-size: 10px;
    color: var(--texto-suave);
    margin-bottom: 2px;
    flex-shrink: 0;
  }

  /* ── CARDS DO AGENTE ── */
  .card-registro {
    background: var(--branco);
    border: 1px solid var(--borda);
    border-radius: 16px;
    overflow: hidden;
    max-width: 300px;
    box-shadow: var(--sombra);
  }

  .card-titulo {
    background: var(--verde-light);
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--verde);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-body { padding: 12px 14px; }

  .card-linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--bg);
    gap: 10px;
  }

  .card-linha:last-child { border-bottom: none; padding-bottom: 0; }

  .card-key {
    font-size: 11px;
    color: var(--texto-suave);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    flex-shrink: 0;
  }

  .card-val {
    font-size: 13px;
    font-weight: 600;
    color: var(--texto);
    text-align: right;
  }

  .card-val.vazio { color: var(--texto-suave); font-weight: 400; font-style: italic; }

  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-andamento { background: var(--amarelo-light); color: #9A6400; }
  .badge-vendido   { background: var(--verde-light); color: var(--verde); }
  .badge-cancelado { background: #FEE9E8; color: #C0392B; }

  .card-footer {
    background: var(--amarelo-light);
    border-top: 1px solid #FAE4B8;
    padding: 8px 14px;
    font-size: 11px;
    color: #9A6400;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── CARD BUSCA ── */
  .card-busca {
    background: var(--branco);
    border: 1px solid var(--borda);
    border-radius: 16px;
    overflow: hidden;
    max-width: 300px;
    box-shadow: var(--sombra);
  }

  .busca-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--bg);
    cursor: default;
  }

  .busca-item:last-child { border-bottom: none; }
  .busca-nome { font-size: 14px; font-weight: 600; color: var(--texto); }
  .busca-detalhe { font-size: 12px; color: var(--texto-suave); margin-top: 2px; }

  .btn-copiar {
    width: calc(100% - 28px);
    margin: 12px 14px;
    background: var(--verde);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-copiar:active { transform: scale(0.97); }
  .btn-copiar.copiado { background: #1AAD74; }

  /* ── TYPING ── */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
    background: var(--branco);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    box-shadow: var(--sombra);
  }

  .typing span {
    width: 7px; height: 7px;
    background: var(--texto-suave);
    border-radius: 50%;
    animation: typingDot 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── INPUT ── */
  .input-area {
    background: var(--branco);
    border-top: 1px solid var(--borda);
    padding: 12px 14px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--borda);
    border-radius: 22px;
    padding: 10px 16px;
    display: flex;
    align-items: flex-end;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--verde-mid);
    background: white;
  }

  textarea#msg {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--texto);
    resize: none;
    max-height: 100px;
    line-height: 1.45;
    overflow-y: auto;
  }

  textarea#msg::placeholder { color: var(--texto-suave); }

  .btn-send {
    width: 44px; height: 44px;
    background: var(--verde);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-send:active { transform: scale(0.93); }
  .btn-send:disabled { background: #B0C9BF; cursor: not-allowed; transform: none; }

  .btn-send svg { width: 20px; height: 20px; fill: white; }

  /* ── BOAS VINDAS ── */
  .boas-vindas {
    text-align: center;
    padding: 10px 20px 0;
  }

  .boas-vindas-icon {
    font-size: 36px;
    margin-bottom: 8px;
  }

  .boas-vindas h2 {
    font-family: 'Lora', serif;
    font-size: 18px;
    color: var(--texto);
    margin-bottom: 6px;
  }

  .boas-vindas p {
    font-size: 13px;
    color: var(--texto-suave);
    line-height: 1.6;
    max-width: 280px;
    margin: 0 auto;
  }

  .sugestoes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  .sugestao {
    background: var(--branco);
    border: 1px solid var(--borda);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--verde);
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .sugestao:active {
    background: var(--verde-light);
    border-color: var(--verde-mid);
  }

  /* CARD ATUALIZAÇÃO */
  .card-atualizacao {
    background: var(--branco);
    border: 1px solid var(--borda);
    border-radius: 16px;
    overflow: hidden;
    max-width: 300px;
    box-shadow: var(--sombra);
  }

  .card-atualizacao .card-titulo { background: #EAF4FF; color: #1565C0; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="avatar">✈️</div>
  <div class="header-info">
    <div class="header-nome">Agente Realiza Tour</div>
    <div class="header-status">
      <div class="dot-online"></div>
      online
    </div>
  </div>
</div>

<!-- CHAT -->
<div class="chat" id="chat">
  <div class="boas-vindas">
    <div class="boas-vindas-icon">🌴</div>
    <h2>Olá, Ericson!</h2>
    <p>Digite como se fosse mandar no WhatsApp. Eu registro, busco e atualizo pra você.</p>
    <div class="sugestoes">
      <div class="sugestao" onclick="sugerir(this)">Registrar interesse</div>
      <div class="sugestao" onclick="sugerir(this)">Quem quer ir pra Salvador?</div>
      <div class="sugestao" onclick="sugerir(this)">João fechou o pacote</div>
      <div class="sugestao" onclick="sugerir(this)">Listar clientes em andamento</div>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="msg" rows="1" placeholder="Digite aqui…"
      oninput="autoResize(this)"
      onkeydown="handleKey(event)"></textarea>
  </div>
  <button class="btn-send" id="btnSend" onclick="enviar()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURAÇÃO — preencha antes de usar em prod
// ══════════════════════════════════════════════
window._ak = '';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxt3kOK_MqzqvGeBTGaXK6LjFIJXyLS_ETjDg7yu654ddwioqPCkiIcQhxVqv_1b8MH/exec';
const SHEET_ID        = '1Mxv6FVOQxxpBc26Socw8bpFH0jufAJlZTo3yyACQEbU';
// ══════════════════════════════════════════════

const chat = document.getElementById('chat');
let enviando = false;

// ── UTILS ──────────────────────────────────────
function hora() {
  return new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
}

function sugerir(el) {
  document.getElementById('msg').value = el.textContent;
  document.getElementById('msg').focus();
}

function scrollBottom() {
  setTimeout(() => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }), 50);
}

// ── ADICIONAR MENSAGEM ─────────────────────────
function addMsg(tipo, conteudo) {
  const row = document.createElement('div');
  row.className = `msg-row ${tipo}`;

  const horaEl = document.createElement('div');
  horaEl.className = 'msg-hora';
  horaEl.textContent = hora();

  if (typeof conteudo === 'string') {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = conteudo;
    if (tipo === 'user') {
      row.appendChild(bubble);
      row.appendChild(horaEl);
    } else {
      row.appendChild(horaEl);
      row.appendChild(bubble);
    }
  } else {
    // card HTML
    if (tipo === 'agente') row.appendChild(horaEl);
    row.appendChild(conteudo);
    if (tipo === 'user') row.appendChild(horaEl);
  }

  chat.appendChild(row);
  scrollBottom();
  return row;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row agente';
  row.id = 'typing';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(t);
  chat.appendChild(row);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

// ── ENVIAR ─────────────────────────────────────
async function enviar() {
  if (enviando) return;
  const input = document.getElementById('msg');
  const texto = input.value.trim();
  if (!texto) return;

  input.value = '';
  input.style.height = 'auto';
  addMsg('user', texto);

  enviando = true;
  document.getElementById('btnSend').disabled = true;
  addTyping();

  try {
    await processarMensagem(texto);
  } catch(e) {
    removeTyping();
    addMsg('agente', '⚠️ Erro: ' + e.message);
  }

  enviando = false;
  document.getElementById('btnSend').disabled = false;
  input.focus();
}

// ── PROCESSAR COM IA ───────────────────────────
async function processarMensagem(texto) {
  const intencao = await detectarIntencao(texto);
  removeTyping();

  if (intencao.acao === 'registrar') {
    await fluxoRegistrar(intencao.dados);
  } else if (intencao.acao === 'buscar') {
    await fluxoBuscar(intencao.filtro);
  } else if (intencao.acao === 'atualizar') {
    await fluxoAtualizar(intencao.dados);
  } else {
    addMsg('agente', intencao.resposta || 'Não entendi. Tente: "João quer pacote pra Gramado" ou "Quem quer ir pra Salvador?"');
  }
}

// ── DETECTAR INTENÇÃO ──────────────────────────
async function detectarIntencao(texto) {
  const prompt = `Você é o agente de uma agência de viagens (Realiza Tour). Analise a mensagem e retorne SOMENTE JSON válido, sem markdown.

Possíveis ações:
1. "registrar" — cliente novo ou interesse novo
2. "buscar" — perguntar quem quer ir a algum lugar ou listar clientes
3. "atualizar" — mudar o status de um cliente existente
4. "outro" — fora do escopo

Para "registrar", extraia:
- nome (string ou "")
- destino (string ou "")
- periodo (string ou "")
- tipo: "Aéreo" | "Pacote" | "Resort/Hotel" | ""
- status: "Em andamento" | "Vendido" | "Cancelado" (padrão: "Em andamento")
- observacoes (string — inclua "aguardando promoção" se mencionado, ou "")

Para "buscar", extraia:
- filtro.destino (string ou "")
- filtro.status (string ou "")

Para "atualizar", extraia:
- dados.nome (nome do cliente)
- dados.novoStatus: "Em andamento" | "Vendido" | "Cancelado"
- dados.observacao (string ou "")

Observação: extraia nomes mesmo em minúsculo ou no meio da frase.

Mensagem: "${texto}"

Retorne apenas JSON. Exemplos:
{"acao":"registrar","dados":{"nome":"João","destino":"Gramado","periodo":"julho","tipo":"Pacote","status":"Em andamento","observacoes":""}}
{"acao":"buscar","filtro":{"destino":"Salvador","status":""}}
{"acao":"atualizar","dados":{"nome":"João Silva","novoStatus":"Vendido","observacao":""}}
{"acao":"outro","resposta":"Mensagem fora do escopo"}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': window._ak,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || 'API ' + res.status);
  }
  const data = await res.json();
  const txt = data.content[0].text.trim().replace(/```json|```/g, '');
  return JSON.parse(txt);
}

// ── INTEGRAÇÃO SHEETS (via Apps Script) ───────
async function salvarNoSheets(payload) {
  if (APPS_SCRIPT_URL === 'SUA_URL_DO_APPS_SCRIPT') return; // demo
  await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
}

async function buscarNoSheets(filtro) {
  if (APPS_SCRIPT_URL === 'SUA_URL_DO_APPS_SCRIPT') {
    // Dados demo
    return [
      { nome: 'Marcos Silva', destino: filtro.destino || 'Gramado', periodo: 'julho', observacoes: 'casal' },
      { nome: 'Ana Rodrigues', destino: filtro.destino || 'Gramado', periodo: 'julho/agosto', observacoes: 'família' },
      { nome: 'Maria Santos', destino: filtro.destino || 'Porto de Galinhas', periodo: 'outubro', observacoes: 'casal' },
    ].filter(c => !filtro.destino || c.destino.toLowerCase().includes(filtro.destino.toLowerCase()));
  }
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ acao: 'buscar', ...filtro })
  });
  const data = await res.json();
  return data.clientes || [];
}

async function atualizarNoSheets(d) {
  if (APPS_SCRIPT_URL === 'SUA_URL_DO_APPS_SCRIPT') return true; // demo
  await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ acao: 'atualizar', ...d }) });
  return true;
}

// Capturar chave na abertura
(function() {
  const key = prompt('Cole sua chave Anthropic (sk-ant-...):');
  if (key && key.startsWith('sk-')) {
    window._ak = key;
  } else {
    setTimeout(() => addMsg('agente', '⚠️ Chave inválida. Recarregue e tente novamente.'), 500);
  }
})();
</script>
</body>
</html>
